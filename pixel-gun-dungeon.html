<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dungeon Arms</title>
<style>
:root{--bg:#120b07;--wood:#3a2315;--wood2:#5b3820;--parch:#ead7aa;--ink:#24170e;--gold:#d8a63a;--red:#9e2f25;--blue:#2d5f73;--green:#3f7a3b;--steel:#8b8f8f;--shadow:#0009}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% 0,#4b2d19,#160d08 62%,#080403);font-family:Georgia,'Times New Roman',serif;color:var(--parch);display:grid;place-items:center;overflow:hidden}.shell{width:min(1180px,96vw);display:grid;grid-template-columns:1fr 310px;gap:16px;align-items:start}.top{grid-column:1/-1;display:flex;justify-content:space-between;align-items:end;gap:16px}.title h1{margin:0;font-size:clamp(34px,5vw,62px);letter-spacing:-1px;color:#ffd879;text-shadow:0 4px #1b0d06,0 0 18px #8a4b19}.title p{margin:4px 0 0;color:#d7bd82}.notice{min-height:48px;text-align:right;color:#ffd879;font-weight:900;text-shadow:0 2px #000}.screen{position:relative;border:8px ridge #8a5a25;border-radius:12px;background:#0b0b12;box-shadow:0 22px 90px #000c, inset 0 0 0 4px #26160d;overflow:hidden}canvas{display:block;width:100%;aspect-ratio:16/10;image-rendering:pixelated}.torch{pointer-events:none;position:absolute;inset:0;background:radial-gradient(circle at 20% 10%,#ffb23d22,transparent 25%),radial-gradient(circle at 80% 12%,#ff722222,transparent 26%),linear-gradient(#0000,#0005);mix-blend-mode:screen}.panel{background:linear-gradient(180deg,#6b4423,#311b10);border:8px ridge #9b6a2c;border-radius:12px;padding:14px;box-shadow:0 16px 50px #0009}.stats{display:grid;grid-template-columns:1fr 1fr;gap:9px}.stat{background:var(--parch);color:var(--ink);border:3px solid #8a5a25;border-radius:8px;padding:9px;box-shadow:inset 0 0 12px #8a5a2533}.lab{display:block;font-size:12px;text-transform:uppercase;font-weight:900;letter-spacing:.7px;color:#6b3c19}.val{font-size:28px;font-weight:900}.weapon{margin-top:14px;padding:13px;background:#ead7aa;color:var(--ink);border:4px double #7d4d1f;border-radius:10px}.weaponName{font-size:28px;font-weight:900;color:#7b211b}.bar{height:16px;background:#2a170d;border:2px solid #7d4d1f;border-radius:999px;overflow:hidden;margin:8px 0}.fill{height:100%;width:100%;background:linear-gradient(90deg,#2d5f73,#d8a63a)}.keys{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.key{background:#23140c;border:2px solid #9b6a2c;border-radius:8px;padding:9px;color:#d7bd82;font-size:13px}.key b{color:#ffe2a3}.btn{width:100%;margin-top:12px;border:4px ridge #bd8a34;border-radius:8px;padding:12px;background:#7b211b;color:#ffe2a3;font-weight:900;font-family:Georgia,'Times New Roman',serif;cursor:pointer}.btn:hover{background:#9e2f25}@media(max-width:900px){.shell{grid-template-columns:1fr}.top{flex-direction:column;align-items:start}.notice{text-align:left}}
</style>
</head>
<body>
<div class="shell"><div class="top"><div class="title"><h1>Dungeon Arms</h1><p>A medieval pixel shooter of blades, bows, relics, and dungeon beasts.</p></div><div class="notice" id="toast">WASD to move. Mouse to aim. Click to attack.</div></div><div class="screen"><canvas id="game" width="960" height="600"></canvas><div class="torch"></div></div><aside class="panel"><div class="stats"><div class="stat"><span class="lab">Health</span><span class="val" id="hp">100</span></div><div class="stat"><span class="lab">Chamber</span><span class="val" id="room">1</span></div><div class="stat"><span class="lab">Gold</span><span class="val" id="coins">0</span></div><div class="stat"><span class="lab">Slain</span><span class="val" id="kills">0</span></div></div><div class="weapon"><span class="lab">Arms</span><div class="weaponName" id="weapon">Crossbow</div><div class="bar"><div class="fill" id="reload"></div></div><span class="lab" id="ammo">Ready</span></div><div class="keys"><div class="key"><b>WASD</b><br>Move</div><div class="key"><b>Mouse</b><br>Aim</div><div class="key"><b>Click</b><br>Attack</div><div class="key"><b>1-4</b><br>Weapons</div><div class="key"><b>Space</b><br>Dodge</div><div class="key"><b>R</b><br>Restart</div></div><button class="btn" id="restartBtn">Restart Quest</button></aside></div>
<script>
const canvas=document.getElementById('game');const ctx=canvas.getContext('2d');ctx.imageSmoothingEnabled=false;const ui={hp:document.getElementById('hp'),room:document.getElementById('room'),coins:document.getElementById('coins'),kills:document.getElementById('kills'),weapon:document.getElementById('weapon'),reload:document.getElementById('reload'),ammo:document.getElementById('ammo'),toast:document.getElementById('toast'),restartBtn:document.getElementById('restartBtn')};
const W=960,H=600,keys={},mouse={x:W/2,y:H/2,down:false};let shake=0,roomNo=1,gold=0,kills=0,gameOver=false,last=performance.now(),spawnTimer=0,attackCd=0;const hero={x:480,y:300,hp:100,max:100,r:13,inv:0,dodge:0};
const arms=[{n:'Crossbow',rate:.24,dmg:28,spd:560,spread:.03,count:1,color:'#d8a63a'},{n:'Scatterbow',rate:.78,dmg:18,spd:455,spread:.34,count:6,color:'#c46d32'},{n:'Runic Lance',rate:.09,dmg:10,spd:760,spread:.01,count:1,pierce:2,color:'#56b6c9'},{n:'Fire Bomb',rate:1.0,dmg:55,spd:300,spread:.07,count:1,boom:76,color:'#d1492e'}];let armIndex=0;
const walls=[{x:72,y:72,w:816,h:32},{x:72,y:496,w:816,h:32},{x:72,y:72,w:32,h:456},{x:856,y:72,w:32,h:456},{x:240,y:210,w:96,h:32},{x:610,y:355,w:120,h:32},{x:430,y:150,w:36,h:120},{x:460,y:430,w:42,h:66}];let bolts=[],beasts=[],sparks=[],drops=[];
function rand(a,b){return a+Math.random()*(b-a)}function say(t){ui.toast.textContent=t}function hitRect(px,py,r,o){return px+r>o.x&&px-r<o.x+o.w&&py+r>o.y&&py-r<o.y+o.h}function solid(px,py,r){return px<90||px>870||py<90||py>510||walls.some(w=>hitRect(px,py,r,w))}function burst(px,py,col,n=12,pow=160){for(let i=0;i<n;i++)sparks.push({x:px,y:py,vx:rand(-pow,pow),vy:rand(-pow,pow),life:rand(.25,.75),col})}
function spawnBeast(){let side=Math.floor(rand(0,4)),b={x:0,y:0,hp:48+roomNo*9,max:48+roomNo*9,spd:rand(48,80)+roomNo*3,r:13,type:'skeleton',hit:0};if(Math.random()<.27+roomNo*.02){b.type='imp';b.r=10;b.hp=28+roomNo*5;b.max=b.hp;b.spd=122+roomNo*4}if(Math.random()<.15+roomNo*.015){b.type='ogre';b.r=18;b.hp=130+roomNo*18;b.max=b.hp;b.spd=36+roomNo*2}if(side===0){b.x=rand(120,840);b.y=105}else if(side===1){b.x=855;b.y=rand(120,480)}else if(side===2){b.x=rand(120,840);b.y=495}else{b.x=105;b.y=rand(120,480)}beasts.push(b)}
function attack(){if(attackCd>0||gameOver)return;const a=arms[armIndex],ang=Math.atan2(mouse.y-hero.y,mouse.x-hero.x);attackCd=a.rate;shake+=a.n==='Scatterbow'?6:3;for(let i=0;i<a.count;i++){let dir=ang+rand(-a.spread,a.spread);bolts.push({x:hero.x+Math.cos(dir)*18,y:hero.y+Math.sin(dir)*18,vx:Math.cos(dir)*a.spd,vy:Math.sin(dir)*a.spd,dmg:a.dmg,life:a.boom?1.15:.9,col:a.color,pierce:a.pierce||0,boom:a.boom||0})}burst(hero.x+Math.cos(ang)*20,hero.y+Math.sin(ang)*20,a.color,6,90)}
function explode(b){burst(b.x,b.y,b.col,40,260);shake+=11;beasts.forEach(e=>{const d=Math.hypot(e.x-b.x,e.y-b.y);if(d<b.boom){e.hp-=b.dmg*(1-d/b.boom)+22;e.hit=.12}})}function hurt(n){if(hero.inv>0||gameOver)return;hero.hp-=n;hero.inv=.75;shake+=9;burst(hero.x,hero.y,'#c9352a',24,220);if(hero.hp<=0){gameOver=true;say('Thou hast fallen. Press R to begin anew.')}}
function nextRoom(){roomNo++;beasts=[];bolts=[];drops=[];hero.hp=Math.min(hero.max,hero.hp+20);for(let i=0;i<5+roomNo*2;i++)spawnBeast();say('Chamber '+roomNo+'. Steel thyself.')}function resetGame(){roomNo=1;gold=0;kills=0;gameOver=false;hero.x=480;hero.y=300;hero.hp=100;hero.inv=0;hero.dodge=0;bolts=[];beasts=[];drops=[];sparks=[];for(let i=0;i<7;i++)spawnBeast();say('The quest begins. Make haste, brave one.')}resetGame();
function update(dt){if(keys.r)resetGame();if(gameOver)return;attackCd=Math.max(0,attackCd-dt);hero.inv=Math.max(0,hero.inv-dt);hero.dodge=Math.max(0,hero.dodge-dt);let ax=(keys.d?1:0)-(keys.a?1:0),ay=(keys.s?1:0)-(keys.w?1:0),mag=Math.hypot(ax,ay)||1,speed=190;if(keys[' ']&&hero.dodge<=0){speed=525;hero.dodge=1;burst(hero.x,hero.y,'#d8a63a',18,190)}let nx=hero.x+ax/mag*speed*dt,ny=hero.y+ay/mag*speed*dt;if(!solid(nx,hero.y,hero.r))hero.x=nx;if(!solid(hero.x,ny,hero.r))hero.y=ny;if(mouse.down)attack();spawnTimer-=dt;if(beasts.length<5+roomNo*2&&spawnTimer<=0){spawnBeast();spawnTimer=rand(.8,1.8)}bolts.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;if(b.boom&&b.life<.25){explode(b);b.life=-1}if(solid(b.x,b.y,4)){if(b.boom)explode(b);b.life=-1}beasts.forEach(e=>{if(b.life>0&&Math.hypot(e.x-b.x,e.y-b.y)<e.r+5){e.hp-=b.dmg;e.hit=.1;burst(b.x,b.y,b.col,5,80);if(b.pierce>0)b.pierce--;else b.life=-1;if(b.boom){explode(b);b.life=-1}}})});bolts=bolts.filter(b=>b.life>0);beasts.forEach(e=>{e.hit=Math.max(0,e.hit-dt);let ang=Math.atan2(hero.y-e.y,hero.x-e.x),step=e.spd*dt,dx=Math.cos(ang)*step,dy=Math.sin(ang)*step,moved=false;const tries=[[dx,dy],[dx,0],[0,dy],[-dy*.7,dx*.7],[dy*.7,-dx*.7],[Math.sign(hero.x-e.x)*step,Math.sign(hero.y-e.y)*step]];for(const t of tries){let nx=e.x+t[0],ny=e.y+t[1];if(!solid(nx,ny,e.r)){e.x=nx;e.y=ny;moved=true;break}}if(!moved){e.x+=rand(-1,1)*step;e.y+=rand(-1,1)*step}if(Math.hypot(e.x-hero.x,e.y-hero.y)<e.r+hero.r)hurt(e.type==='ogre'?18:10);if(e.hp<=0){kills++;gold+=e.type==='ogre'?8:3;burst(e.x,e.y,e.type==='imp'?'#b45ed1':e.type==='ogre'?'#9a5c2d':'#c7c7b3',24,210);if(Math.random()<.2)drops.push({x:e.x,y:e.y,type:'heal'});e.dead=true}});beasts=beasts.filter(e=>!e.dead);drops.forEach(d=>{if(Math.hypot(d.x-hero.x,d.y-hero.y)<24){hero.hp=Math.min(hero.max,hero.hp+18);burst(d.x,d.y,'#3f7a3b',18,150);d.dead=true}});drops=drops.filter(d=>!d.dead);if(beasts.length===0)nextRoom();sparks.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;p.vx*=.92;p.vy*=.92});sparks=sparks.filter(p=>p.life>0);shake*=.86}
function sprite(px,py,type,flash){ctx.save();ctx.translate(Math.round(px),Math.round(py));ctx.fillStyle=flash?'#fff':type==='hero'?'#d8a63a':type==='imp'?'#b45ed1':type==='ogre'?'#9a5c2d':'#c7c7b3';if(type==='hero'){ctx.fillRect(-9,-11,18,22);ctx.fillRect(-13,-5,26,10);ctx.fillStyle='#2b1b11';ctx.fillRect(-4,-6,3,3);ctx.fillRect(4,-6,3,3);ctx.fillStyle=arms[armIndex].color;let a=Math.atan2(mouse.y-hero.y,mouse.x-hero.x);ctx.rotate(a);ctx.fillRect(8,-3,20,6)}else if(type==='imp'){ctx.fillRect(-8,-7,16,14);ctx.fillRect(-13,-12,5,8);ctx.fillRect(8,-12,5,8);ctx.fillStyle='#2b1b11';ctx.fillRect(-4,-4,3,3);ctx.fillRect(4,-4,3,3)}else if(type==='ogre'){ctx.fillRect(-15,-16,30,32);ctx.fillRect(-20,-4,40,12);ctx.fillStyle='#2b1b11';ctx.fillRect(-6,-6,4,4);ctx.fillRect(5,-6,4,4)}else{ctx.fillRect(-9,-13,18,26);ctx.fillRect(-13,-4,26,8);ctx.fillStyle='#2b1b11';ctx.fillRect(-5,-7,4,4);ctx.fillRect(4,-7,4,4)}ctx.restore()}
function draw(){let sx=rand(-shake,shake),sy=rand(-shake,shake);ctx.save();ctx.translate(sx,sy);ctx.fillStyle='#15100c';ctx.fillRect(0,0,W,H);for(let yy=80;yy<528;yy+=32)for(let xx=80;xx<888;xx+=32){ctx.fillStyle=((xx+yy)/32)%2?'#2a2119':'#33281d';ctx.fillRect(xx,yy,32,32);ctx.fillStyle='#47331f';ctx.fillRect(xx,yy,2,32);ctx.fillRect(xx,yy,32,2)}walls.forEach(w=>{ctx.fillStyle='#4a3827';ctx.fillRect(w.x,w.y,w.w,w.h);ctx.fillStyle='#7a5630';ctx.fillRect(w.x,w.y,w.w,6);ctx.fillStyle='#21150d';ctx.fillRect(w.x,w.y+w.h-6,w.w,6)});drops.forEach(d=>{ctx.fillStyle='#3f7a3b';ctx.fillRect(d.x-7,d.y-7,14,14);ctx.fillStyle='#e6ffd5';ctx.fillRect(d.x-3,d.y-9,6,18);ctx.fillRect(d.x-9,d.y-3,18,6)});bolts.forEach(b=>{ctx.fillStyle=b.col;ctx.fillRect(b.x-4,b.y-4,8,8);ctx.fillStyle='#ffe7a4';ctx.fillRect(b.x-2,b.y-2,4,4)});beasts.forEach(e=>{sprite(e.x,e.y,e.type,e.hit>0);ctx.fillStyle='#180d08';ctx.fillRect(e.x-16,e.y-e.r-12,32,4);ctx.fillStyle='#9e2f25';ctx.fillRect(e.x-16,e.y-e.r-12,32*Math.max(0,e.hp/e.max),4)});sprite(hero.x,hero.y,'hero',hero.inv>0&&Math.floor(performance.now()/70)%2);sparks.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life*2);ctx.fillStyle=p.col;ctx.fillRect(p.x,p.y,4,4);ctx.globalAlpha=1});if(gameOver){ctx.fillStyle='#000a';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffd879';ctx.font='bold 54px Georgia';ctx.textAlign='center';ctx.fillText('QUEST FAILED',W/2,H/2-12);ctx.fillStyle='#ead7aa';ctx.font='bold 22px Georgia';ctx.fillText('Press R to restart',W/2,H/2+30);ctx.textAlign='left'}ctx.restore()}
function sync(){ui.hp.textContent=Math.max(0,Math.ceil(hero.hp));ui.room.textContent=roomNo;ui.coins.textContent=gold;ui.kills.textContent=kills;ui.weapon.textContent=arms[armIndex].n;ui.reload.style.width=(100*(1-attackCd/arms[armIndex].rate))+'%';ui.ammo.textContent=attackCd>0?'Recovering':'Ready'}
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if('1234'.includes(e.key)){armIndex=Number(e.key)-1;say(arms[armIndex].n+' readied.')}});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);canvas.addEventListener('mousemove',e=>{let r=canvas.getBoundingClientRect();mouse.x=(e.clientX-r.left)*W/r.width;mouse.y=(e.clientY-r.top)*H/r.height});canvas.addEventListener('mousedown',()=>mouse.down=true);addEventListener('mouseup',()=>mouse.down=false);ui.restartBtn.addEventListener('click',resetGame);function loop(t){let dt=Math.min(.033,(t-last)/1000);last=t;update(dt);draw();sync();requestAnimationFrame(loop)}requestAnimationFrame(loop);
</script>
</body>
</html>
