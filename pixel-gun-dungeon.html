<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pixel Gun Dungeon</title>
<style>
:root{--bg:#0b0d16;--panel:#15192a;--ink:#f5f7ff;--muted:#97a2c5;--red:#ff5d73;--cyan:#55e6ff;--gold:#ffd166;--green:#7cff9b;--purple:#b48cff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% 0,#23284a,#0b0d16 55%,#070811);color:var(--ink);font-family:system-ui,Segoe UI,sans-serif;min-height:100vh;display:grid;place-items:center;overflow:hidden}.shell{width:min(1180px,96vw);display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start}.top{grid-column:1/-1;display:flex;justify-content:space-between;gap:16px;align-items:end}.title h1{margin:0;font-size:clamp(30px,5vw,56px);letter-spacing:-2px;text-shadow:0 4px #000}.title p{margin:4px 0 0;color:var(--muted)}.screen{position:relative;background:#101522;border:4px solid #3d466d;border-radius:18px;box-shadow:0 20px 90px #000b;overflow:hidden}canvas{display:block;width:100%;aspect-ratio:16/10;image-rendering:pixelated}.scan{pointer-events:none;position:absolute;inset:0;background:linear-gradient(#fff1 1px,transparent 1px);background-size:100% 4px;mix-blend-mode:overlay;opacity:.23}.panel{background:linear-gradient(180deg,#1a2038,#101420);border:2px solid #333d62;border-radius:18px;padding:16px;box-shadow:0 16px 45px #0007}.stats{display:grid;grid-template-columns:1fr 1fr;gap:9px}.stat{background:#0b1020;border:2px solid #2f3859;border-radius:12px;padding:10px}.lab{display:block;color:var(--muted);font-size:12px;text-transform:uppercase;font-weight:800}.val{font-size:26px;font-weight:900}.weapon{margin-top:14px;padding:14px;border-radius:14px;background:#10172a;border:2px solid #364168}.weaponName{font-size:26px;font-weight:1000;color:var(--gold)}.bar{height:14px;background:#060914;border:2px solid #2c3558;border-radius:999px;overflow:hidden;margin:8px 0}.fill{height:100%;width:100%;background:linear-gradient(90deg,var(--cyan),var(--purple))}.keys{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.key{background:#11182b;border:2px solid #303b60;border-radius:10px;padding:9px;color:var(--muted);font-size:13px}.key b{color:var(--ink)}.toast{min-height:46px;color:var(--gold);font-weight:900;text-align:right}.btn{width:100%;margin-top:12px;border:0;border-radius:12px;padding:12px;background:#314067;color:white;font-weight:900;cursor:pointer}.btn:hover{background:#405284}@media(max-width:900px){.shell{grid-template-columns:1fr}.top{flex-direction:column;align-items:start}.toast{text-align:left}}
</style>
</head>
<body>
<div class="shell"><div class="top"><div class="title"><h1>Pixel Gun Dungeon</h1><p>Clear rooms, swap weapons, collect neon loot, survive the dungeon.</p></div><div class="toast" id="toast">WASD to move. Mouse to aim. Click to shoot.</div></div><div class="screen"><canvas id="game" width="960" height="600"></canvas><div class="scan"></div></div><aside class="panel"><div class="stats"><div class="stat"><span class="lab">HP</span><span class="val" id="hp">100</span></div><div class="stat"><span class="lab">Room</span><span class="val" id="room">1</span></div><div class="stat"><span class="lab">Coins</span><span class="val" id="coins">0</span></div><div class="stat"><span class="lab">Kills</span><span class="val" id="kills">0</span></div></div><div class="weapon"><span class="lab">Weapon</span><div class="weaponName" id="weapon">Pistol</div><div class="bar"><div class="fill" id="reload"></div></div><span class="lab" id="ammo">Ready</span></div><div class="keys"><div class="key"><b>WASD</b><br>Move</div><div class="key"><b>Mouse</b><br>Aim</div><div class="key"><b>Click</b><br>Shoot</div><div class="key"><b>1-4</b><br>Weapons</div><div class="key"><b>Space</b><br>Dash</div><div class="key"><b>R</b><br>Restart</div></div><button class="btn" id="restart">Restart Run</button></aside></div>
<script>
const c=document.getElementById('game'),x=c.getContext('2d');x.imageSmoothingEnabled=false;const ui={hp:hp,room:room,coins:coins,kills:kills,weapon:weapon,reload:reload,ammo:ammo,toast:toast};
const W=960,H=600,keys={},mouse={x:W/2,y:H/2,down:false};let shake=0,roomNo=1,coins=0,kills=0,over=false,last=performance.now(),spawnTimer=0;
const player={x:480,y:300,vx:0,vy:0,hp:100,max:100,r:13,inv:0,dash:0};
const weapons=[{n:'Pistol',rate:.22,dmg:24,spd:520,spread:.04,count:1,color:'#ffd166'},{n:'Shotgun',rate:.72,dmg:18,spd:460,spread:.32,count:6,color:'#ff8a5c'},{n:'Laser',rate:.08,dmg:9,spd:720,spread:.01,count:1,pierce:2,color:'#55e6ff'},{n:'Grenade',rate:.95,dmg:52,spd:290,spread:.07,count:1,boom:70,color:'#b48cff'}];let wi=0,cd=0;
let bullets=[],enemies=[],bits=[],drops=[];const walls=[{x:72,y:72,w:816,h:32},{x:72,y:496,w:816,h:32},{x:72,y:72,w:32,h:456},{x:856,y:72,w:32,h:456},{x:240,y:210,w:96,h:32},{x:610,y:355,w:120,h:32},{x:430,y:150,w:36,h:120},{x:460,y:430,w:42,h:66}];
function rnd(a,b){return a+Math.random()*(b-a)}function say(t){ui.toast.textContent=t}function rectHit(px,py,r,o){return px+r>o.x&&px-r<o.x+o.w&&py+r>o.y&&py-r<o.y+o.h}function solid(px,py,r){return walls.some(w=>rectHit(px,py,r,w))||px<90||px>870||py<90||py>510}
function addBits(px,py,col,n=12,pow=160){for(let i=0;i<n;i++)bits.push({x:px,y:py,vx:rnd(-pow,pow),vy:rnd(-pow,pow),life:rnd(.25,.7),col})}
function spawnEnemy(){let side=Math.floor(rnd(0,4)),e={x:0,y:0,hp:45+roomNo*8,max:45+roomNo*8,spd:rnd(48,82)+roomNo*3,r:13,type:'grunt',hit:0};if(Math.random()<.25+roomNo*.02){e.type='bat';e.r=10;e.hp=26+roomNo*5;e.max=e.hp;e.spd=120+roomNo*4}if(Math.random()<.14+roomNo*.015){e.type='brute';e.r=18;e.hp=120+roomNo*18;e.max=e.hp;e.spd=36+roomNo*2}if(side==0){e.x=rnd(120,840);e.y=105}else if(side==1){e.x=855;e.y=rnd(120,480)}else if(side==2){e.x=rnd(120,840);e.y=495}else{e.x=105;e.y=rnd(120,480)}enemies.push(e)}
function shoot(){if(cd>0||over)return;let w=weapons[wi],ang=Math.atan2(mouse.y-player.y,mouse.x-player.x);cd=w.rate;shake+=w.n==='Shotgun'?6:3;for(let i=0;i<w.count;i++){let a=ang+rnd(-w.spread,w.spread);bullets.push({x:player.x+Math.cos(a)*18,y:player.y+Math.sin(a)*18,vx:Math.cos(a)*w.spd,vy:Math.sin(a)*w.spd,dmg:w.dmg,life:w.boom?1.15:.9,col:w.color,pierce:w.pierce||0,boom:w.boom||0})}addBits(player.x+Math.cos(ang)*20,player.y+Math.sin(ang)*20,w.color,6,90)}
function explode(b){addBits(b.x,b.y,b.col,34,250);shake+=10;enemies.forEach(e=>{let d=Math.hypot(e.x-b.x,e.y-b.y);if(d<b.boom){e.hp-=b.dmg*(1-d/b.boom)+20;e.hit=.12}})}
function hurt(n){if(player.inv>0||over)return;player.hp-=n;player.inv=.75;shake+=9;addBits(player.x,player.y,'#ff5d73',22,220);if(player.hp<=0){over=true;say('You were defeated. Press R to restart.')}}
function nextRoom(){roomNo++;enemies=[];bullets=[];drops=[];player.hp=Math.min(player.max,player.hp+20);for(let i=0;i<5+roomNo*2;i++)spawnEnemy();say('Room '+roomNo+'. The dungeon gets louder.')}function restart(){roomNo=1;coins=0;kills=0;over=false;player.x=480;player.y=300;player.hp=100;enemies=[];bullets=[];drops=[];bits=[];for(let i=0;i<7;i++)spawnEnemy();say('New run. Make the dungeon regret it.')}restart();
function update(dt){if(keys.r)restart();if(over)return;cd=Math.max(0,cd-dt);player.inv=Math.max(0,player.inv-dt);player.dash=Math.max(0,player.dash-dt);let ax=(keys.d?1:0)-(keys.a?1:0),ay=(keys.s?1:0)-(keys.w?1:0),mag=Math.hypot(ax,ay)||1,speed=190;if(keys[' ']&&player.dash<=0){speed=520;player.dash=1;addBits(player.x,player.y,'#55e6ff',18,180)}let nx=player.x+ax/mag*speed*dt,ny=player.y+ay/mag*speed*dt;if(!solid(nx,player.y,player.r))player.x=nx;if(!solid(player.x,ny,player.r))player.y=ny;if(mouse.down)shoot();spawnTimer-=dt;if(enemies.length<5+roomNo*2&&spawnTimer<=0){spawnEnemy();spawnTimer=rnd(.8,1.8)}bullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;if(b.boom&&b.life<.25){explode(b);b.life=-1}if(solid(b.x,b.y,4)){if(b.boom)explode(b);b.life=-1}enemies.forEach(e=>{if(b.life>0&&Math.hypot(e.x-b.x,e.y-b.y)<e.r+5){e.hp-=b.dmg;e.hit=.1;addBits(b.x,b.y,b.col,5,80);if(b.pierce>0)b.pierce--;else b.life=-1;if(b.boom){explode(b);b.life=-1}}})});bullets=bullets.filter(b=>b.life>0);enemies.forEach(e=>{e.hit=Math.max(0,e.hit-dt);let a=Math.atan2(player.y-e.y,player.x-e.x),nx=e.x+Math.cos(a)*e.spd*dt,ny=e.y+Math.sin(a)*e.spd*dt;if(!solid(nx,e.y,e.r))e.x=nx;if(!solid(e.x,ny,e.r))e.y=ny;if(Math.hypot(e.x-player.x,e.y-player.y)<e.r+player.r)hurt(e.type==='brute'?18:10);if(e.hp<=0){kills++;coins+=e.type==='brute'?8:3;addBits(e.x,e.y,e.type==='bat'?'#b48cff':e.type==='brute'?'#ff8a5c':'#7cff9b',24,210);if(Math.random()<.18)drops.push({x:e.x,y:e.y,type:'heal'});e.dead=true}});enemies=enemies.filter(e=>!e.dead);drops.forEach(d=>{if(Math.hypot(d.x-player.x,d.y-player.y)<24){player.hp=Math.min(player.max,player.hp+18);addBits(d.x,d.y,'#7cff9b',18,150);d.dead=true}});drops=drops.filter(d=>!d.dead);if(enemies.length===0&&roomNo<99)nextRoom();bits.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;p.vx*=.92;p.vy*=.92});bits=bits.filter(p=>p.life>0);shake*=.86}
function drawSprite(px,py,type,flash){x.save();x.translate(Math.round(px),Math.round(py));x.fillStyle=flash?'#fff':type==='player'?'#55e6ff':type==='bat'?'#b48cff':type==='brute'?'#ff8a5c':'#7cff9b';if(type==='player'){x.fillRect(-9,-11,18,22);x.fillRect(-13,-5,26,10);x.fillStyle='#0b0d16';x.fillRect(-4,-6,3,3);x.fillRect(4,-6,3,3);x.fillStyle=weapons[wi].color;let a=Math.atan2(mouse.y-player.y,mouse.x-player.x);x.rotate(a);x.fillRect(8,-3,18,6)}else if(type==='bat'){x.fillRect(-8,-6,16,12);x.fillRect(-18,-3,10,6);x.fillRect(8,-3,10,6)}else if(type==='brute'){x.fillRect(-14,-16,28,32);x.fillRect(-18,-4,36,12);x.fillStyle='#0b0d16';x.fillRect(-6,-6,4,4);x.fillRect(5,-6,4,4)}else{x.fillRect(-10,-12,20,24);x.fillRect(-14,-4,28,10);x.fillStyle='#0b0d16';x.fillRect(-5,-6,4,4);x.fillRect(4,-6,4,4)}x.restore()}
function draw(){let sx=rnd(-shake,shake),sy=rnd(-shake,shake);x.save();x.translate(sx,sy);x.fillStyle='#070a12';x.fillRect(0,0,W,H);for(let yy=80;yy<528;yy+=32)for(let xx=80;xx<888;xx+=32){x.fillStyle=((xx+yy)/32)%2?'#12182a':'#151c31';x.fillRect(xx,yy,32,32);x.fillStyle='#202844';x.fillRect(xx,yy,2,32);x.fillRect(xx,yy,32,2)}walls.forEach(w=>{x.fillStyle='#2b3456';x.fillRect(w.x,w.y,w.w,w.h);x.fillStyle='#46527d';x.fillRect(w.x,w.y,w.w,6);x.fillStyle='#151a2d';x.fillRect(w.x,w.y+w.h-6,w.w,6)});drops.forEach(d=>{x.fillStyle='#7cff9b';x.fillRect(d.x-7,d.y-7,14,14);x.fillStyle='#eaffef';x.fillRect(d.x-3,d.y-9,6,18);x.fillRect(d.x-9,d.y-3,18,6)});bullets.forEach(b=>{x.fillStyle=b.col;x.fillRect(b.x-4,b.y-4,8,8);x.fillStyle='#fff';x.fillRect(b.x-2,b.y-2,4,4)});enemies.forEach(e=>{drawSprite(e.x,e.y,e.type,e.hit>0);x.fillStyle='#070811';x.fillRect(e.x-16,e.y-e.r-12,32,4);x.fillStyle='#ff5d73';x.fillRect(e.x-16,e.y-e.r-12,32*Math.max(0,e.hp/e.max),4)});drawSprite(player.x,player.y,'player',player.inv>0&&Math.floor(performance.now()/70)%2);bits.forEach(p=>{x.globalAlpha=Math.max(0,p.life*2);x.fillStyle=p.col;x.fillRect(p.x,p.y,4,4);x.globalAlpha=1});if(over){x.fillStyle='#0009';x.fillRect(0,0,W,H);x.fillStyle='#ff5d73';x.font='bold 54px monospace';x.textAlign='center';x.fillText('RUN OVER',W/2,H/2-12);x.fillStyle='#f5f7ff';x.font='bold 22px monospace';x.fillText('Press R to restart',W/2,H/2+30);x.textAlign='left'}x.restore()}
function sync(){ui.hp.textContent=Math.max(0,Math.ceil(player.hp));ui.room.textContent=roomNo;ui.coins.textContent=coins;ui.kills.textContent=kills;ui.weapon.textContent=weapons[wi].n;ui.reload.style.width=(100*(1-cd/weapons[wi].rate))+'%';ui.ammo.textContent=cd>0?'Reloading':'Ready'}
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if('1234'.includes(e.key)){wi=+e.key-1;say(weapons[wi].n+' equipped.')}});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);c.addEventListener('mousemove',e=>{let r=c.getBoundingClientRect();mouse.x=(e.clientX-r.left)*W/r.width;mouse.y=(e.clientY-r.top)*H/r.height});c.addEventListener('mousedown',()=>mouse.down=true);addEventListener('mouseup',()=>mouse.down=false);restart.onclick=restart;function loop(t){let dt=Math.min(.033,(t-last)/1000);last=t;update(dt);draw();sync();requestAnimationFrame(loop)}requestAnimationFrame(loop);
</script>
</body>
</html>
